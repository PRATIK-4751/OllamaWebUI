# ============================================
#  Ollama WebUI — Docker Compose
#  Run:  docker compose up -d
#  Open: http://localhost:3000
# ============================================

services:
  backend:
    image: lucifero19/ollama-backend:latest
    container_name: ollama-backend
    ports:
      - "8000:8000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:8000/api/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 40s
    networks:
      - ollama-network

  ollama-webui:
    image: lucifero19/ollama-webui:latest
    container_name: ollama-webui
    ports:
      - "3000:80"
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - ollama-network

networks:
  ollama-network:
    driver: bridge
