version: '3.8'

services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ollama_webui_frontend
    ports:
      - "5173:80"  # Mapping port 5173 on the host to port 80 in NGINX
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - webui-net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ollama_webui_backend
    ports:
      - "8000:8000" # Allowing direct testing of FastAPI backend
    restart: unless-stopped
    networks:
      - webui-net
    volumes:
      - ./backend:/app  # Optional: syncs backend code for fast iteration without rebuilding
      
networks:
  webui-net:
    driver: bridge
